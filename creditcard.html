	<style>
		
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            color: white;
            font-family: Arial, sans-serif;
        }

        .credits {
            position: absolute;
            bottom: -100%;
            width: 100%;
            text-align: center;
            animation: scrollCredits 8s linear forwards;
        }

        @keyframes scrollCredits {
            from { bottom: -100%; }
            to { bottom: 100%; }
        }

        .thankyou {
            position: absolute;
            top: 50%;
            width: 100%;
            text-align: center;
            font-size: 40px;
            opacity: 0;
            transform: translateY(-50%);
            animation: showThanks 3s ease forwards;
            animation-delay: 8s; /* appears after credits */
        }

        @keyframes showThanks {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    
	</style>
